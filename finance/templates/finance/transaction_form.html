{% extends 'finance/base.html' %}

{% block title %}{{ action }} Transaction | Corporate Finance Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'transaction_list' %}" class="btn btn-link text-decoration-none ps-0">
                <i class="bi bi-arrow-left"></i> Back to List
            </a>
            <h2 class="fw-bold mb-0 ms-2">{{ action }} Transaction</h2>
        </div>

        <div class="card table-card">
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Date</label>
                            <input type="date" name="date" class="form-control" value="{{ transaction.date|date:'Y-m-d'|default:'' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Transaction Type</label>
                            <select name="transaction_type" class="form-select" required>
                                <option value="EXPENSE" {% if transaction.transaction_type == 'EXPENSE' %}selected{% endif %}>Expense</option>
                                <option value="INCOME" {% if transaction.transaction_type == 'INCOME' %}selected{% endif %}>Income</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Amount (₹)</label>
                            <input type="number" step="0.01" name="amount" class="form-control" value="{{ transaction.amount|default:'' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Reference Number</label>
                            <input type="text" name="reference_number" class="form-control" value="{{ transaction.reference_number|default:'' }}" placeholder="INV-2024-001">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Description</label>
                            <input type="text" name="description" class="form-control" value="{{ transaction.description|default:'' }}" required placeholder="Brief description of the transaction">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Category</label>
                            <select name="category" class="form-select" required>
                                <option value="">Select Category</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if transaction.category_id == cat.id %}selected{% endif %}>{{ cat.name }} ({{ cat.get_category_type_display }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Department</label>
                            <select name="department" class="form-select">
                                <option value="">None / Corporate Wide</option>
                                {% for dept in departments %}
                                <option value="{{ dept.id }}" {% if transaction.department_id == dept.id %}selected{% endif %}>{{ dept.name }} ({{ dept.code }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Payment Method</label>
                            <select name="payment_method" class="form-select">
                                <option value="">Select Payment Method</option>
                                {% for method in payment_methods %}
                                <option value="{{ method.id }}" {% if transaction.payment_method_id == method.id %}selected{% endif %}>{{ method.name }} ({{ method.get_method_type_display }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Status</label>
                            <select name="status" class="form-select">
                                <option value="PENDING" {% if transaction.status == 'PENDING' %}selected{% endif %}>Pending</option>
                                <option value="APPROVED" {% if transaction.status == 'APPROVED' %}selected{% endif %}>Approved</option>
                                <option value="RECONCILED" {% if transaction.status == 'RECONCILED' %}selected{% endif %}>Reconciled</option>
                                <option value="REJECTED" {% if transaction.status == 'REJECTED' %}selected{% endif %}>Rejected</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Notes</label>
                            <textarea name="notes" class="form-control" rows="3">{{ transaction.notes|default:'' }}</textarea>
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary px-5">Save Transaction</button>
                            <a href="{% url 'transaction_list' %}" class="btn btn-light ms-2">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
